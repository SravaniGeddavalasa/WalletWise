# Server Port Configuration
server.port=8080

# PostgreSQL Database Connection Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/walletwise
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' automatically updates/creates tables.
spring.jpa.hibernate.ddl-auto=update
# Display SQL statements executed in the console (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Mail (SMTP) Configuration for Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# Your actual Gmail address
spring.mail.username=walletwise.auth@gmail.com

# 16-character Google App Password (NOT your normal Gmail password)
spring.mail.password=gvlv lzep nsst pnuh

# Required settings for Gmail SMTP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Logging Configuration
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=TRACE
logging.level.com.walletwise.demo=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
