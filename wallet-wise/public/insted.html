<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalletWise - Login</title>
    <style>
        /* Basic styling to match the dark theme in the image */
        body {
            background-color: white;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color:white;
            color: #2a2a2a;
            padding: 40px;
            border-radius: 8px;
            width: 350px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(39, 28, 28, 0.3);
        }
        .logo {
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #0b0202;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .oauth-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .oauth-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: 1px solid #080202;
            color: rgb(6, 2, 2);
            border-radius: 4px;
            cursor: pointer;
        }
        .divider {
            color: #100404;
            font-size: 11px;
            margin: 20px 0;
        }
        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: #140303;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background-color:white;
            border: 1px solid #444;
            border-radius: 4px;
            color: white;
        }
        .password-header {
            display: flex;
            justify-content: space-between;
        }
        .forgot-link {
            color:palevioletred;
            font-size: 12px;
            text-decoration: none;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color:rgba(3, 95, 244, 0.645);
            border: none;
            border-radius: 4px;
            color:white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .footer-text {
            margin-top: 20px;
            font-size: 13px;
            color: #130303;
        }
        .footer-text a {
            color: palevioletred;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">WalletWise🦉</div>
    <h2>Welcome back</h2>
    <p class="subtitle">Log in to your account to continue</p>

    <!-- Social Login Buttons -->
    <div class="oauth-buttons">
        <button class="oauth-btn">G Google</button>
        <button class="oauth-btn">🐱 GitHub</button>
    </div>

    <div class="divider">OR CONTINUE WITH EMAIL</div>

    <!-- MAIN FORM: Navigates to the live site link on submit -->
    <form action="https://expensevision.tech" method="POST">
        
        <!-- Email Field -->
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <!-- Password Field -->
        <div class="input-group">
            <div class="password-header">
                <label for="password">Password</label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn">Log In</button>
    </form>

    <p class="footer-text">
        New to WalletWise? <br>
        <a href="https://expensevision.tech">Create a free account</a>
    </p>
</div>

</body>
</html>
