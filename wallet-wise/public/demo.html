<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WalletWise</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-900 text-white">

  <div class="p-6 max-w-6xl mx-auto">

    <!-- Header -->
    <h1 class="text-4xl font-bold mb-2">Dashboard</h1>
    <p class="text-slate-400 mb-8">Your smart financial companion</p>

    <!-- Grid -->
    <div class="grid md:grid-cols-3 gap-6">

      <!-- Chart -->
      <div class="bg-slate-800 p-5 rounded-2xl">
        <h2 class="text-xl mb-4">Spending Overview</h2>
        <canvas id="chart"></canvas>
      </div>

      <!-- AI Insights -->
      <div class="bg-slate-800 p-5 rounded-2xl">
        <h2 class="text-xl mb-4">AI Insights</h2>

        <div class="space-y-3 text-sm">
          <div class="bg-slate-700 p-3 rounded-xl">
            Food spending increased by 18% this month.
          </div>
          <div class="bg-slate-700 p-3 rounded-xl">
            Travel expenses are under control.
          </div>
          <div class="bg-slate-700 p-3 rounded-xl">
            You can save ₹6,500 next month.
          </div>
        </div>
      </div>

      <!-- Add Expense -->
      <div class="bg-slate-800 p-5 rounded-2xl">
        <h2 class="text-xl mb-4">Add Expense</h2>

        <input id="title" class="w-full p-2 mb-2 rounded bg-slate-700" placeholder="Title">
        <input id="amount" type="number" class="w-full p-2 mb-2 rounded bg-slate-700" placeholder="Amount">

        <select id="category" class="w-full p-2 mb-2 rounded bg-slate-700">
          <option>Food</option>
          <option>Travel</option>
          <option>Bills</option>
          <option>Shopping</option>
        </select>

        <button onclick="addExpense()" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded">
          Add Expense
        </button>
      </div>

    </div>

    <!-- Expense List -->
    <div class="mt-8 bg-slate-800 p-5 rounded-2xl">
      <h2 class="text-xl mb-4">Recent Expenses</h2>
      <ul id="list" class="space-y-2 text-sm"></ul>
    </div>

  </div>

<script>
let expenses = [
  { title: "Pizza", amount: 250, category: "Food" },
  { title: "Bus Ticket", amount: 120, category: "Travel" },
  { title: "Electric Bill", amount: 900, category: "Bills" }
];

function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  expenses.forEach(e => {
    const li = document.createElement("li");
    li.className = "bg-slate-700 p-2 rounded";
    li.textContent = `${e.title} - ₹${e.amount} (${e.category})`;
    list.appendChild(li);
  });
}

function addExpense() {
  const title = document.getElementById("title").value;
  const amount = document.getElementById("amount").value;
  const category = document.getElementById("category").value;

  if (!title || !amount) return;

  expenses.push({
    title,
    amount: Number(amount),
    category
  });

  renderList();
  updateChart();
}

function updateChart() {
  const categoryTotals = {};

  expenses.forEach(e => {
    categoryTotals[e.category] = (categoryTotals[e.category] || 0) + e.amount;
  });

  chart.data.labels = Object.keys(categoryTotals);
  chart.data.datasets[0].data = Object.values(categoryTotals);
  chart.update();
}

// Chart
const ctx = document.getElementById('chart');

const chart = new Chart(ctx, {
  type: 'pie',
  data: {
    labels: ["Food", "Travel", "Bills"],
    datasets: [{
      data: [250, 120, 900],
      backgroundColor: ["#3b82f6", "#10b981", "#f59e0b", "#ef4444"]
    }]
  }
});

renderList();
</script>

</body>
</html>
